[general]
live_config_reload = true

[window]
opacity = 0.7
blur = false
title = "you wouldn't guess"
dynamic_title = true
decorations_theme_variant = "None"

[scrolling]
history = 100_000
multiplier = 4

[font]
size = 12

  [font.normal]
  family = "Luxi Mono"
  style = "Regular"

  [font.bold]
  family = "Luxi Mono"
  style = "Bold"

  [font.italic]
  family = "Luxi Mono"
  style = "Oblique"

  [font.bold_italic]
  family = "Luxi Mono"
  style = "Bold Oblique"

[colors]

  [colors.primary]
  background = '0x000000'
  foreground = '0xc1c1c1'
  
  [colors.cursor]
  text = '0x000000'
  cursor = '0xc1c1c1'
  
  [colors.normal]
  black = '0x000000'
  red = '0x5f8787'
  green = '0xf8f7f2'
  yellow = '0x79241f'
  blue = '0x888888'
  magenta = '0x999999'
  cyan = '0xaaaaaa'
  white = '0xc1c1c1'

  [colors.bright]
